version: "3.9"
services:
  postgres:
    image: postgres:13.2
    container_name: db_playground_postgres
    environment:
      POSTGRES_PASSWORD: admin
      POSTGRES_USER: admin
      POSTGRES_DB: northwind
    volumes:
      - ./postgres/dataset/northwind.sql:/docker-entrypoint-initdb.d/northwind.sql
      - db_playground_pgdata:/var/lib/postgresql/data
    ports:
      - "6432:5432"

  mysql:
    image: mysql:8
    container_name: db_playground_mysql
    environment:
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
      MYSQL_DATABASE: northwind
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - ./mysql/dataset:/docker-entrypoint-initdb.d
      - db_playground_mysqldata:/var/lib/mysql
    ports:
      - "4306:3306"

  mariadb:
    image: mariadb:11
    container_name: db_playground_mariadb
    environment:
      MARIADB_USER: admin
      MARIADB_PASSWORD: admin
      MARIADB_DATABASE: northwind
      MARIADB_ROOT_PASSWORD: root
    volumes:
      - ./mariadb/dataset:/docker-entrypoint-initdb.d
      - db_playground_mariadbdata:/var/lib/mysql
    ports:
      - "4307:3306"

  mongo:
    image: mongo:6.0
    container_name: db_playground_mongo
    environment:
      MONGO_INITDB_DATABASE: northwind
    volumes:
      - db_playground_mongodata:/data/db
    ports:
      - "37017:27017"

  mongo-seed:
    build: mongodb
    container_name: db_pg_mongo_seed
    environment:
      - DB_NAME=northwind
    links:
      - mongo

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.0
    container_name: db_playground_elasticsearch
    environment:
      node.name: elasticsearch
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
    ports:
      - "9200:9200"
      - "9300:9300"

  redis:
    image: redis:7.2
    container_name: db_playground_redis
    ports:
      - "6379:6379"

  sqlite:
    build: sqlite
    container_name: db_playground_sqlite
    volumes:
      - ./sqlite/data:/data

  duckdb:
    build: duckdb
    container_name: db_playground_duckdb
    volumes:
      - ./duckdb/data:/data

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: db_playground_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Admin@1234"
      MSSQL_PID: Developer
    volumes:
      - db_playground_sqlserverdata:/var/opt/mssql
    ports:
      - "1434:1433"

  sqlserver-seed:
    build: sqlserver
    container_name: db_pg_sqlserver_seed
    environment:
      - DB_HOST=sqlserver
      - SA_PASSWORD=Admin@1234
    links:
      - sqlserver

  elasticsearch-seed:
    build: elasticsearch
    container_name: db_pg_elastic_seed
    environment:
      - ES_HOST=elasticsearch
      - ES_PORT=9200
    links:
      - elasticsearch

  dynamodb:
    image: amazon/dynamodb-local:latest
    container_name: db_playground_dynamodb
    user: root
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /home/dynamodblocal/data"
    volumes:
      - db_playground_dynamodbdata:/home/dynamodblocal/data
    ports:
      - "8000:8000"

  dynamodb-seed:
    build: dynamodb
    container_name: db_pg_dynamodb_seed
    environment:
      - DB_HOST=dynamodb
      - DB_PORT=8000
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - AWS_DEFAULT_REGION=us-east-1
    links:
      - dynamodb

volumes:
  db_playground_pgdata:
  db_playground_mysqldata:
  db_playground_mariadbdata:
  db_playground_mongodata:
  db_playground_sqlserverdata:
  db_playground_dynamodbdata:
